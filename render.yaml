services:
  - type: web
    name: job-compass
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: SEARCH_PROVIDER
        value: tavily
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: FORUM_SESSION_SECRET
        generateValue: true
      - key: FORUM_PHONE_HASH_SECRET
        generateValue: true
      - key: MYSQL_URL
        sync: false
