{% extends "base.html" %}
{% block title %}职路 · 外企求职{% endblock %}
{% block body_class %}foreign-page{% endblock %}
{% block content %}
<main class="foreign-workspace">
  <section class="foreign-hero">
    <div><span class="eyebrow">FOREIGN COMPANY CAREER DESK</span><h1>先读懂你的经历，<br /><em>再找真正适合的岗位</em></h1><p>简历解析、岗位匹配和模型调用都在 Python 服务端完成，页面不依赖浏览器脚本。</p></div>
    <div class="foreign-method-card"><span>01</span><strong>导入简历</strong><i></i><span>02</span><strong>提取能力</strong><i></i><span>03</span><strong>给出方向</strong></div>
  </section>
  <section class="forum-panel server-main-panel">
    <div class="forum-panel-head"><div><span class="eyebrow">RESUME PROFILE</span><h2>导入并分析简历</h2></div><span class="privacy-badge">不落盘保存</span></div>
    <form method="post" action="/foreign/analyze" enctype="multipart/form-data" class="forum-form server-filter-grid">
      <label><span>简历文件</span><input name="resume_file" type="file" accept=".pdf,.docx,.txt,.md" /></label>
      <label><span>目标城市</span><input name="city" value="天津市" /></label>
      <label><span>英语使用能力</span><select name="english"><option>不知道，按岗位原文核验</option><option>可处理英文邮件</option><option>可参与日常英语沟通</option><option>可进行商务英语沟通</option></select></label>
      <label><span>DeepSeek 模型</span><select name="model"><option>deepseek-v4-flash</option><option>deepseek-v4-pro</option></select></label>
      <label class="server-wide"><span>偏向岗位</span><input name="roles" placeholder="例如：采购助理、HR、订单管理" /></label>
      <label class="server-wide"><span>简历文字或补充说明</span><textarea name="resume_text" rows="10" placeholder="也可以直接粘贴简历正文"></textarea></label>
      <label class="privacy-consent server-wide"><input name="privacy_consent" value="accepted" type="checkbox" required /><span>我已阅读<a href="/privacy" target="_blank">隐私政策</a>，同意本次内容发送给 DeepSeek API 进行分析。</span></label>
      <button class="generate-button server-wide" type="submit"><span>分析简历并推荐岗位方向</span><b aria-hidden="true">→</b></button>
    </form>
  </section>
</main>
{% endblock %}
