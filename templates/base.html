<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="职路，应届生企业筛选、外企求职和求职交流工具。" />
    <title>{% block title %}职路 · 求职信息助手{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/brand-logo-v2.png" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <header class="foreign-topbar server-topbar">
      <a class="foreign-brand" href="/" aria-label="返回职路企业筛选">
        <img src="/static/brand-logo-v2.png" alt="" />
        <span><strong>职路</strong><small>Graduate Job Compass</small></span>
      </a>
      <nav class="workspace-tabs" aria-label="工作台">
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">企业筛选</a>
        <a href="/foreign" class="{% if request.url.path.startswith('/foreign') %}active{% endif %}">外企求职</a>
        <a href="/forum" class="{% if request.url.path.startswith('/forum') %}active{% endif %}">求职论坛</a>
      </nav>
      <div class="server-account">
        <a class="admin-entry-link {% if request.url.path.startswith('/admin') %}active{% endif %}" href="/admin" aria-label="打开管理后台">管理后台</a>
        {% if current_user %}
          <span class="user-avatar" aria-label="{{ current_user.displayName }}的头像">{{ avatar_initial }}</span>
          <span class="server-account-name"><strong>{{ current_user.displayName }}</strong><small>{{ role_label }}</small></span>
          <form method="post" action="/auth/logout">
            <input type="hidden" name="next" value="{{ request.url.path }}" />
            <button class="quiet-button compact-button" type="submit">退出</button>
          </form>
        {% else %}
          <details class="login-popover">
            <summary class="global-user-button"><span aria-hidden="true">用</span><strong>用户登录</strong></summary>
            <div class="login-popover-panel">
              <span class="eyebrow">USER ACCESS</span>
              <h2>登录职路账号</h2>
              <form method="post" action="/auth/login" class="forum-form">
                <input type="hidden" name="next" value="{{ request.url.path }}" />
                <label><span>手机号</span><input name="phone" type="tel" required /></label>
                <label><span>密码</span><input name="password" type="password" minlength="6" required /></label>
                <button class="admin-login-button" type="submit">登录</button>
              </form>
              <a class="quiet-button register-link" href="/forum#register">没有账号？前往注册</a>
            </div>
          </details>
        {% endif %}
      </div>
    </header>
    {% if message or error %}
      <div class="server-notice {% if error %}error{% endif %}" role="status"><span>{{ error or message }}</span><a href="{{ request.url.path }}" aria-label="关闭提示">×</a></div>
    {% endif %}
    {% block content %}{% endblock %}
  </body>
</html>
